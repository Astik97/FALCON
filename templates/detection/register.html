<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Crime Alert System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='detection/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Falcon Security Logo">
        </div>
        <form id="register-form" method="POST" action="{{ url_for('register') }}">
            <h1>Create Account</h1>
            <p class="system-title">Crime Alert & Reporting System</p>

            <div class="input-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <div id="error-message">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <p class="msg-{{ category }}">{{ message }}
                            </p>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>
            <button type="submit" class="btn">Register</button>
            <p class="form-link">
                Already have an account? <a href="{{url_for('login')}}">Login here</a>
            </p>
        </form>
    </div>
</body>
</html>
